env:
  # https://unix.stackexchange.com/questions/597445/why-would-i-set-term-to-xterm-256color-when-using-alacritty
  TERM: xterm-256color
import:
- ~/.config/alacritty/themes/themes/catppuccin_mocha.yaml
#- ~/.config/alacritty/catppuccin_old.yaml
window:
  # TPM (tmux package manager) command "remove/uninstall plugins not on the plugin list"
  # is issued with <prefix> + alt + u. If we don't set the option key (macOS) as alt it
  # won't work.
  option_as_alt: OnlyLeft
  startup_mode: Windowed
  decorations: transparent
  # Open up the window positioned in the center of the MacBook Pro 16-inch 2019.
  # TODO: Make it an override only applied if using a MacBook!
  position:
    x: 75
    y: 100
  padding:
    x: 15
    y: 35
  dimensions:
    columns: 177
    lines: 45
font:
  # NOTE: Install those fonts from https://www.nerdfonts.com/
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  size: 16
# TODO: How can the visual bell be tested?
visual_bell:
  animation: Linear
  duration: 100
  color: '0xffffff'
scrolling:
  # Maximum number of lines in the scrollback buffer. Specifying '0' will disable
  # scrolling. Align it with `tmux.conf` `history-limit`.
  history: 50000
key_bindings:
  - { key: M, mods: Control|Shift, action: ToggleSimpleFullscreen }
  - { key: N, mods: Control|Shift, action: CreateNewWindow }
  - { key: H, mods: Control|Shift, action: Minimize }
  - { key: Y, mods: Control|Shift, action: ClearHistory }
  # TODO: Investigate if the `/usr/local/bin` can be omitted.
  - { key: O, mods: Control|Shift, command: { program: "/usr/local/bin/alacritty", args: ["msg", "config", "window.opacity=0.8"]} }
  - { key: P, mods: Control|Shift, command: { program: "/usr/local/bin/alacritty", args: ["msg", "config", "window.opacity=1"]} }
