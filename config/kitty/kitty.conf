# Theme
include ~/.config/themes/tokyonight.nvim/extras/kitty/tokyonight_storm.conf

# https://unix.stackexchange.com/questions/597445/why-would-i-set-term-to-xterm-256color-when-using-alacritty
term xterm-256color

# Font. `auto` picks the bold/italic variants of the same family.
font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18

# Scrolling
scrollback_lines 50000

# Window
remember_window_size  no
initial_window_width  160c
initial_window_height 41c

# Hide the title bar but keep the macOS traffic light buttons.
# This mirrors alacritty's `decorations = "transparent"`. The buttons
# float on top of the window content, which is why we add top padding
# below to give them breathing room.
hide_window_decorations titlebar-only
macos_titlebar_color    background

# TPM (tmux package manager) "remove/uninstall plugins not on the plugin
# list" is issued with <prefix> + alt + u. If we don't set the option key
# (macOS) as alt it won't work.
macos_option_as_alt left

# Transparency + blur
background_opacity         0.75
dynamic_background_opacity yes
# On macOS this is the blur radius (default 5, max 64). Low values like
# 1-5 are barely visible — use 32+ for a noticeable frosted-glass effect
# comparable to alacritty's `blur = true`.
background_blur            64

# Padding: top right bottom left.
# The extra top padding leaves room for the macOS traffic light buttons.
window_padding_width 35 15 15 15

# Note: kitty has no native equivalent of alacritty's [window.position].
# Initial window position on macOS must be handled externally (e.g. via
# a window manager or `yabai`/`Hammerspoon`).

# Required for the font-size cycle binding below (uses `kitten @`).
allow_remote_control yes

# Keyboard bindings ===========================================================

map alt+[       send_text all “
map alt+shift+[ send_text all ”
map alt+shift+- send_text all —

map ctrl+shift+m toggle_fullscreen

map super+ctrl+shift+alt+y clear_terminal scrollback active

# Opacity cycling (1 = fully opaque -> 7 = fully transparent)
map super+ctrl+shift+alt+1 set_background_opacity 1.0
map super+ctrl+shift+alt+2 set_background_opacity 0.91
map super+ctrl+shift+alt+3 set_background_opacity 0.83
map super+ctrl+shift+alt+4 set_background_opacity 0.74
map super+ctrl+shift+alt+5 set_background_opacity 0.65
map super+ctrl+shift+alt+6 set_background_opacity 0.4
map super+ctrl+shift+alt+7 set_background_opacity 0.0

# Blur level (8 = max -> 0 = off). Blur is a static setting in kitty
# (no runtime action exists), so these bindings rewrite kitty.conf and
# reload it so the change persists.
map super+ctrl+shift+alt+8 launch --type=background sh -c "sed -i '' 's/^background_blur .*/background_blur            64/' ~/.config/kitty/kitty.conf && kitten @ load-config"
map super+ctrl+shift+alt+9 launch --type=background sh -c "sed -i '' 's/^background_blur .*/background_blur            32/' ~/.config/kitty/kitty.conf && kitten @ load-config"
map super+ctrl+shift+alt+0 launch --type=background sh -c "sed -i '' 's/^background_blur .*/background_blur            0/'  ~/.config/kitty/kitty.conf && kitten @ load-config"

# Cycle font size: 18 -> 20 -> 14 -> 16 -> 18 ...
map super+ctrl+shift+alt+z launch --type=background /Users/ramon/.local/bin/kitty_cycle_font_size.sh

# Bell
enable_audio_bell no
command_on_bell   afplay /System/Library/Sounds/Pop.aiff
